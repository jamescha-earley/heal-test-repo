# Code Healer -- Auto-fix bugs on new issues
#
# When a new issue is opened, this workflow:
#   1. Checks out the code
#   2. Runs the Code Healer agent to analyze and fix the bug
#   3. Creates a PR with the fix
#   4. Comments on the issue with the result
#
# Prerequisites:
#   - SNOWFLAKE_CONFIG repo secret must contain a valid connections.toml for Cortex CLI auth
#   - The GITHUB_TOKEN needs write access to issues and pull requests (default for Actions)

name: Code Healer

on:
  issues:
    types: [opened]

jobs:
  heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Code Healer
        uses: jamescha-earley/code-healer@main
        id: healer
        with:
          issue-number: ${{ github.event.issue.number }}
          snowflake-config: ${{ secrets.SNOWFLAKE_CONFIG }}
          snowflake-connection: devrel

      - name: Summary
        run: |
          echo "### Code Healer Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.healer.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: ${{ steps.healer.outputs.pr-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Confidence**: ${{ steps.healer.outputs.confidence }}" >> $GITHUB_STEP_SUMMARY
